<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grok Chat</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <!-- 대화 목록 사이드바 -->
      <aside id="sidebar" class="sidebar">
        <button id="new-chat" class="new-chat">＋ 새 대화</button>
        <ul id="conv-list" class="conv-list"></ul>
        <div class="sidebar-foot">로컬 브라우저에 저장됨</div>
      </aside>

      <!-- 메인 채팅 영역 -->
      <section class="main">
        <header class="topbar">
          <div class="brand">
            <button id="toggle-sidebar" class="icon-btn" title="목록 토글">☰</button>
            <span class="logo">✦</span>
            <span class="title-text" id="conv-title">Grok Chat</span>
          </div>
          <div class="meta">
            <span id="model-badge" class="badge">…</span>
            <span id="token-badge" class="badge" title="이번 세션 누적 토큰">∑ 0 tok</span>
            <button id="export-md" class="ghost-btn" title="Markdown으로 내보내기">⤓ MD</button>
            <button id="export-json" class="ghost-btn" title="JSON으로 내보내기">⤓ JSON</button>
          </div>
        </header>

        <main id="messages" class="messages">
          <div class="empty" id="empty-state">
            <h1>무엇을 도와드릴까요?</h1>
            <p>xAI Grok에게 무엇이든 물어보세요.</p>
          </div>
        </main>

        <form id="composer" class="composer">
          <textarea
            id="input"
            class="input"
            rows="1"
            placeholder="메시지를 입력하세요…  (Enter 전송 · Shift+Enter 줄바꿈)"
            autocomplete="off"
          ></textarea>
          <button id="send-btn" class="send-btn" type="submit" aria-label="전송">
            ➤
          </button>
        </form>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
